metadata:
  last_indexed: "2026-06-04T21:09:08+00:00"

phases:
  - id: work
    name: Work
    description: Implement the requested Nix changes conservatively.
    conventions:
      - Edit only what is required for the task.
      - Keep changes minimal and preserve existing behavior.
      - Add new packages through `overlays.nix` following existing patterns.
      - Use overlay-first package wiring: expose flake-input packages in `overlays.nix` first, then consume them as `pkgs.<name>` in modules.
      - If `flake.nix` inputs change, update `flake.lock` in the same change set.
      - Use agenix for secrets management.
      - Before handing work off, state which files changed, what was implemented, which verification commands were run, and what remains unverified.
    gate:
      - Requested change is implemented.
      - No unrelated files were changed.
      - "`flake.lock` was updated when `flake.nix` inputs changed."

  - id: nix-review
    name: Nix Review
    description: Review the change set and require stronger evidence only when Nix files were touched.
    conventions:
      - Run the review as the `@workflow-review` subagent, not in the main agent.
      - Require verification evidence before approval.
      - If no .nix files were changed, verify the skip rationale and approve without forcing Nix-only checks.
      - If .nix files were changed, review only the changed .nix files and require `nix build .#nixosConfigurations.$(hostname).config.system.build.toplevel --dry-run` evidence.
      - Treat new evaluation or deprecation warnings as defects.
      - Escalate to a broader or full `nix build` only for high-risk changes such as shared modules, overlays, flake inputs, or cross-host wiring.
    gate:
      - Review evidence matches the changed files.
      - Either no .nix files changed, or the required Nix dry-run completed successfully.
      - No new evaluation or deprecation warnings were introduced.

  - id: routes-update
    name: Routes Update
    description: Update the module routing table after review when changed routes must be reflected in docs/routes.md.
    conventions:
      - Always evaluate whether the change modifies module routing, file locations, or routing guidance captured in docs/routes.md.
      - If routes changed or new routed files were introduced, update `docs/routes.md` in the same change set.
      - If no routing changes are required, state that explicitly in the final handoff.
    gate:
      - Routing impact was evaluated.
      - "`docs/routes.md` was updated when required."
      - Final handoff states whether routing documentation changed.

transitions:
  - from: work
    to: nix-review
  - from: nix-review
    to: routes-update

project_conventions:
  branching:
    pattern: "main"
    main_branch: main
  commits:
    format: short imperative subject
  code_style:
    language: Nix
    linter: none observed
    formatter: nixpkgs-fmt (`make fmt`)

