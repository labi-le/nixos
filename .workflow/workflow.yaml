version: 1
metadata:
  last_indexed: "2026-04-16T00:00:00Z"

phases:
  - id: edit
    name: Edit
    description: Make changes to nix configuration files
    conventions:
      - Use nixpkgs-fmt to format .nix files before committing
      - Add new packages via overlays.nix following existing patterns
      - Use agenix for secrets management
    gate:
      - "nixpkgs-fmt passes on edited files"

  - id: test
    name: Test
    description: Validate configuration with nixos-rebuild
    conventions:
      - Test locally with nixos-rebuild dry-run before pushing
      - Use make fmt before testing
    gate:
      - "nix build .#nixosConfigurations.<host>.config.system.build.toplevel --dry-run succeeds"

  - id: finalize
    name: Finalize
    description: Final review for project file changes
    conventions:
      - Run this phase whenever project files were changed
      - Review git status before completing work
      - Update docs/routes.md when module routing changes
      - Invoke @workflow-review before finishing work
    gate:
      - "git status --short reviewed for all project file changes"
      - "docs/routes.md updated when NixOS or Home Manager module routing changed"
      - "@workflow-review approves the completed work"

transitions:
  - from: edit
    to: test
  - from: test
    to: finalize

project_conventions:
  branching:
    pattern: "main"
    main_branch: main
  commits:
    format: conventional
  code_style:
    language: Nix
    linter: nixpkgs-fmt
    formatter: nixpkgs-fmt
